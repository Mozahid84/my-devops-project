version: '3.8'

services:
  mssql-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mssql-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
      - MSSQL_SA_PASSWORD=YourStr0ng!Passw0rd
      - MSSQL_VERSION=2019
      - MSSQL_EDITION=Developer
      - VM1_HOST=devops_VM1
      - VM2_HOST=devops_VM2
      - VM1_USER=root
      - VM2_USER=root
      - SSH_KEY_PATH=/root/.ssh/id_rsa
      - LOCAL_BACKUP_DIR=/app/backups/vm1_striped
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.ssh:/root/.ssh:ro
    networks:
      - mssql-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  mssql-network:
    driver: bridge
