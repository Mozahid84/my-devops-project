---
# AWX Credentials Configuration

# Machine Credential for SSH Access
- name: mssql-ssh-credential
  type: Machine
  description: SSH credentials for MSSQL servers
  username: root
  password: "{{ lookup('env', 'ANSIBLE_SSH_PASSWORD') }}"
  become_method: sudo
  become_username: root
  organization: Default

# Vault Credential (if using Ansible Vault)
- name: mssql-vault-credential
  type: Vault
  description: Vault for sensitive data
  vault_password: "{{ lookup('env', 'ANSIBLE_VAULT_PASSWORD') }}"
  organization: Default
