---
# AWX Credentials Configuration

# Machine Credential for SSH Access
- name: mssql-ssh-credential
  credential_type: Machine
  organization: Default
  description: SSH credentials for MSSQL servers
  inputs:
    username: root
    password: "devops"
    become_method: sudo
    become_username: root

# Gitlab source control credential type
- name: gitlab-ssh-credential
  credential_type: Source Control
  organization: Default
  description: SSH key for accessing GitLab repositories
  inputs:
    username: git
    ssh_key_data: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      YOUR_PRIVATE_KEY_CONTENT_HERE
      -----END OPENSSH PRIVATE KEY-----